<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08080B; font-family: 'Hanken Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
  .lbx-scroll::-webkit-scrollbar { display: none; }
  .lbx-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes lbx-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
</style>
</helmet>
<div style="min-height:100vh; background:radial-gradient(circle at 50% 0%, #16161f, #08080B 70%); display:flex; align-items:center; justify-content:center; padding:40px 20px;">

  <!-- PHONE -->
  <div style="width:390px; height:844px; background:#0B0B0E; border-radius:52px; border:1px solid #22222B; box-shadow:0 40px 120px rgba(0,0,0,0.7), inset 0 0 0 6px #000; position:relative; overflow:hidden;">

    <!-- status bar -->
    <div style="position:absolute; top:0; left:0; right:0; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:16px 26px 12px; color:#F4F3F1; background:linear-gradient(to bottom,#0B0B0E 60%,transparent);">
      <span style="font-family:'Hanken Grotesk'; font-size:15px; font-weight:700; letter-spacing:0.02em;">21:04</span>
      <div style="display:flex; gap:7px; align-items:center;">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#F4F3F1"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.4"/></svg>
        <svg width="17" height="12" viewBox="0 0 24 18" fill="none" stroke="#F4F3F1" stroke-width="2"><path d="M2 6.5C7 2 17 2 22 6.5M5.5 10C9 7 15 7 18.5 10M9 13.5c1.8-1.5 4.2-1.5 6 0"/></svg>
        <div style="width:24px; height:12px; border:1.5px solid #F4F3F1; border-radius:3px; padding:1.5px; display:flex;"><div style="flex:1; background:#F4F3F1; border-radius:1px;"></div></div>
      </div>
    </div>

    <!-- scrolling content -->
    <div class="lbx-scroll" style="position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; padding-top:52px;">

      <!-- header -->
      <div style="padding:12px 24px 20px; display:flex; align-items:flex-end; justify-content:space-between;">
        <div>
          <div style="font-family:'JetBrains Mono'; font-size:11px; letter-spacing:0.14em; color:#0A84FF; margin-bottom:8px;">JULHO 2026</div>
          <h1 style="font-family:'Space Grotesk'; font-size:32px; font-weight:600; letter-spacing:-0.02em; color:#F4F3F1;">Agenda</h1>
        </div>
        <div style="width:40px; height:40px; border-radius:12px; background:#131317; border:1px solid #22222B; display:flex; align-items:center; justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F4F3F1" stroke-width="1.6"><path d="M4 7h16M7 12h10M10 17h4"/></svg></div>
      </div>

      <!-- week strip -->
      <div class="lbx-scroll" style="display:flex; gap:9px; overflow-x:auto; padding:0 24px 8px;">
        <sc-for list="{{ week }}" as="d" hint-placeholder-count="7">
          <div style="flex-shrink:0; width:50px; border-radius:16px; padding:12px 0 10px; text-align:center; background:{{ d.bg }}; border:1px solid {{ d.border }};">
            <div style="font-family:'JetBrains Mono'; font-size:10px; letter-spacing:0.05em; color:{{ d.labelColor }}; margin-bottom:6px;">{{ d.dow }}</div>
            <div style="font-family:'Space Grotesk'; font-size:17px; font-weight:600; color:{{ d.numColor }};">{{ d.num }}</div>
            <div style="width:5px; height:5px; border-radius:50%; margin:7px auto 0; background:{{ d.dot }};"></div>
          </div>
        </sc-for>
      </div>

      <!-- summary bar -->
      <div style="margin:16px 24px 0; padding:16px 18px; border-radius:18px; background:linear-gradient(135deg,rgba(10,132,255,0.14),rgba(10,132,255,0.03)); border:1px solid rgba(10,132,255,0.22); display:flex; align-items:center; gap:14px;">
        <div style="width:42px; height:42px; border-radius:12px; background:rgba(10,132,255,0.18); display:flex; align-items:center; justify-content:center; flex-shrink:0;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0A84FF" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
        <div style="flex:1;">
          <div style="font-family:'Hanken Grotesk'; font-size:15px; font-weight:700; color:#F4F3F1;">Sábado, 6 de julho</div>
          <div style="font-size:13px; color:#9A99A0; margin-top:1px;">2 filmes · 4h 40m no total</div>
        </div>
      </div>

      <!-- timeline label -->
      <div style="display:flex; align-items:center; justify-content:space-between; padding:26px 24px 14px;">
        <span style="font-family:'Space Grotesk'; font-size:18px; font-weight:600; color:#F4F3F1;">Sua noite</span>
        <span style="font-size:13px; color:#0A84FF; font-weight:600;">Otimizar</span>
      </div>

      <!-- schedule cards timeline -->
      <div style="padding:0 24px 130px;">

        <!-- item 1 : TONIGHT -->
        <div style="display:flex; gap:14px;">
          <div style="display:flex; flex-direction:column; align-items:center; padding-top:4px;">
            <div style="font-family:'JetBrains Mono'; font-size:12px; font-weight:500; color:#0A84FF;">20:30</div>
            <div style="width:10px; height:10px; border-radius:50%; background:#0A84FF; margin-top:8px; box-shadow:0 0 0 4px rgba(10,132,255,0.2);"></div>
            <div style="width:2px; flex:1; background:#22222B; margin-top:4px;"></div>
          </div>
          <div style="flex:1; margin-bottom:16px; border-radius:20px; overflow:hidden; border:1px solid #22222B; background:#131317;">
            <div style="height:120px; background:linear-gradient(135deg,#1b2a3d,#0f1620); position:relative;">
              <div style="position:absolute; inset:0; background:repeating-linear-gradient(115deg,rgba(255,255,255,0.02) 0 16px,transparent 16px 34px);"></div>
              <div style="position:absolute; inset:0; background:linear-gradient(to top,#131317,transparent 70%);"></div>
              <div style="position:absolute; top:12px; left:14px; font-family:'JetBrains Mono'; font-size:10px; font-weight:500; letter-spacing:0.08em; color:#08080B; background:#0A84FF; padding:4px 10px; border-radius:999px;">HOJE À NOITE</div>
            </div>
            <div style="padding:14px 16px 16px;">
              <div style="font-family:'Space Grotesk'; font-size:19px; font-weight:600; color:#F4F3F1;">Blade Runner 2049</div>
              <div style="display:flex; align-items:center; gap:12px; margin-top:8px;">
                <span style="display:flex; align-items:center; gap:5px; font-size:13px; color:#9A99A0;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9A99A0" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>2h 44m</span>
                <span style="display:flex; align-items:center; gap:6px; font-size:13px; color:#9A99A0;"><span style="width:7px; height:7px; border-radius:2px; background:#6AA6E0;"></span>Prime Video</span>
              </div>
              <button style="width:100%; margin-top:14px; display:flex; align-items:center; justify-content:center; gap:8px; font-family:'Hanken Grotesk'; font-size:15px; font-weight:600; color:#08080B; background:#F4F3F1; border:none; padding:13px; border-radius:12px; cursor:pointer;"><svg width="16" height="16" viewBox="0 0 24 24" fill="#08080B"><path d="M7 5l12 7-12 7z"/></svg>Começar a assistir</button>
            </div>
          </div>
        </div>

        <!-- item 2 -->
        <div style="display:flex; gap:14px;">
          <div style="display:flex; flex-direction:column; align-items:center; padding-top:4px;">
            <div style="font-family:'JetBrains Mono'; font-size:12px; font-weight:500; color:#7A7A82;">23:30</div>
            <div style="width:10px; height:10px; border-radius:50%; background:#131317; border:2px solid #3A3A45; margin-top:8px;"></div>
            <div style="width:2px; flex:1; background:#22222B; margin-top:4px;"></div>
          </div>
          <div style="flex:1; margin-bottom:16px; display:flex; gap:14px; border-radius:18px; border:1px solid #1C1C22; background:#131317; padding:12px;">
            <div style="width:64px; height:96px; border-radius:10px; background:linear-gradient(160deg,#334a45,#111815); border:1px solid rgba(255,255,255,0.06); flex-shrink:0;"></div>
            <div style="flex:1; min-width:0;">
              <div style="font-family:'Hanken Grotesk'; font-size:16px; font-weight:700; color:#F4F3F1;">Arrival</div>
              <div style="font-size:12px; color:#9A99A0; margin-top:3px;">1h 56m · Ficção</div>
              <div style="display:flex; gap:6px; margin-top:10px;">
                <span style="font-family:'JetBrains Mono'; font-size:11px; color:#E9A23B; background:rgba(233,162,59,0.12); padding:3px 8px; border-radius:6px;">★ 7.9</span>
                <span style="display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:#9A99A0; background:#191920; padding:3px 9px; border-radius:6px;"><span style="width:6px; height:6px; border-radius:2px; background:#E5615A;"></span>Netflix</span>
              </div>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5A5A62" stroke-width="1.5" style="align-self:center; flex-shrink:0;"><path d="M9 6l6 6-6 6"/></svg>
          </div>
        </div>

        <!-- add slot -->
        <div style="display:flex; gap:14px;">
          <div style="display:flex; flex-direction:column; align-items:center; padding-top:4px;">
            <div style="font-family:'JetBrains Mono'; font-size:12px; font-weight:500; color:#5A5A62;">Livre</div>
            <div style="width:10px; height:10px; border-radius:50%; background:#131317; border:2px solid #2A2A33; margin-top:8px;"></div>
          </div>
          <button style="flex:1; display:flex; align-items:center; justify-content:center; gap:9px; border-radius:18px; border:1.5px dashed #2A2A33; background:transparent; padding:20px; cursor:pointer;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0A84FF" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
            <span style="font-family:'Hanken Grotesk'; font-size:14px; font-weight:600; color:#9A99A0;">Adicionar filme a esta noite</span>
          </button>
        </div>
      </div>
    </div>

    <!-- FAB -->
    <div style="position:absolute; right:22px; bottom:104px; width:58px; height:58px; border-radius:50%; background:linear-gradient(145deg,#0A84FF,#0055B8); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 30px rgba(10,132,255,0.45); animation:lbx-float 4s ease-in-out infinite; cursor:pointer;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FBFAF7" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
    </div>

    <!-- TAB BAR -->
    <div style="position:absolute; left:14px; right:14px; bottom:16px; background:rgba(19,19,23,0.72); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:26px; padding:14px 10px 12px; display:flex; justify-content:space-around; box-shadow:0 12px 40px rgba(0,0,0,0.5);">
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#7A7A82" stroke-width="1.6"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg><span style="font-size:10px; color:#7A7A82;">Início</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="#0A84FF"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4" stroke="#0B0B0E" stroke-width="1.6"/></svg><span style="font-size:10px; font-weight:600; color:#0A84FF;">Agenda</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#7A7A82" stroke-width="1.6"><rect x="4" y="4" width="6" height="16" rx="1"/><rect x="14" y="4" width="6" height="16" rx="1"/></svg><span style="font-size:10px; color:#7A7A82;">Biblioteca</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#7A7A82" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span style="font-size:10px; color:#7A7A82;">Perfil</span></div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:924}}">
class Component extends DCLogic {
  renderVals() {
    const active = { bg:'#0A84FF', border:'#0A84FF', labelColor:'rgba(251,250,247,0.8)', numColor:'#FBFAF7', dot:'#FBFAF7' };
    const has = { bg:'#131317', border:'#22222B', labelColor:'#7A7A82', numColor:'#F4F3F1', dot:'#0A84FF' };
    const free = { bg:'#131317', border:'#1C1C22', labelColor:'#5A5A62', numColor:'#9A99A0', dot:'transparent' };
    const week = [
      { dow:'SEG', num:'1', ...free },
      { dow:'TER', num:'2', ...has },
      { dow:'QUA', num:'3', ...free },
      { dow:'QUI', num:'4', ...has },
      { dow:'SEX', num:'5', ...free },
      { dow:'SÁB', num:'6', ...active },
      { dow:'DOM', num:'7', ...has },
    ];
    return { week };
  }
}
</script>
</body>
</html>

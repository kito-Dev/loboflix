<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08080B; font-family: 'Hanken Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
  .lbx-scroll::-webkit-scrollbar { display: none; }
  .lbx-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes lbx-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes lbx-glow { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
</style>
</helmet>
<div style="min-height:100vh; background:radial-gradient(circle at 50% 0%, #16161f, #08080B 70%); display:flex; align-items:center; justify-content:center; padding:40px 20px;">

  <!-- PHONE -->
  <div style="width:390px; height:844px; background:#0B0B0E; border-radius:52px; border:1px solid #22222B; box-shadow:0 40px 120px rgba(0,0,0,0.7), inset 0 0 0 6px #000; position:relative; overflow:hidden;">

    <!-- status bar -->
    <div style="position:absolute; top:0; left:0; right:0; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:16px 26px 10px; color:#F4F3F1;">
      <span style="font-family:'Hanken Grotesk'; font-size:15px; font-weight:700; letter-spacing:0.02em;">21:04</span>
      <div style="display:flex; gap:7px; align-items:center;">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#F4F3F1"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.4"/></svg>
        <svg width="17" height="12" viewBox="0 0 24 18" fill="none" stroke="#F4F3F1" stroke-width="2"><path d="M2 6.5C7 2 17 2 22 6.5M5.5 10C9 7 15 7 18.5 10M9 13.5c1.8-1.5 4.2-1.5 6 0"/></svg>
        <div style="width:24px; height:12px; border:1.5px solid #F4F3F1; border-radius:3px; padding:1.5px; display:flex;"><div style="flex:1; background:#F4F3F1; border-radius:1px;"></div></div>
      </div>
    </div>

    <!-- header -->
    <div style="position:absolute; top:52px; left:0; right:0; z-index:4; padding:8px 24px 0; display:flex; align-items:flex-end; justify-content:space-between;">
      <div>
        <div style="font-family:'JetBrains Mono'; font-size:11px; letter-spacing:0.14em; color:#7A7A82; margin-bottom:8px;">0 FILMES</div>
        <h1 style="font-family:'Space Grotesk'; font-size:32px; font-weight:600; letter-spacing:-0.02em; color:#F4F3F1;">Biblioteca</h1>
      </div>
    </div>

    <!-- disabled search -->
    <div style="position:absolute; top:150px; left:0; right:0; z-index:4; padding:0 24px;">
      <div style="display:flex; align-items:center; gap:10px; background:#131317; border:1px solid #1C1C22; border-radius:14px; padding:13px 15px; opacity:0.55;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5A5A62" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
        <span style="flex:1; font-size:14px; color:#5A5A62;">Buscar na sua lista</span>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div style="position:absolute; top:150px; bottom:96px; left:0; right:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px; text-align:center;">

      <!-- glyph: ghost poster grid with wolf -->
      <div style="position:relative; width:180px; height:150px; margin-bottom:34px;">
        <!-- ghost posters -->
        <div style="position:absolute; left:8px; top:20px; width:52px; height:78px; border-radius:10px; background:#131317; border:1px solid #1C1C22; transform:rotate(-9deg);"></div>
        <div style="position:absolute; right:8px; top:20px; width:52px; height:78px; border-radius:10px; background:#131317; border:1px solid #1C1C22; transform:rotate(9deg);"></div>
        <div style="position:absolute; left:50%; top:8px; transform:translateX(-50%); width:60px; height:90px; border-radius:12px; background:#191920; border:1px solid #22222B; display:flex; align-items:center; justify-content:center;">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="#2E2E38" fill-rule="evenodd"><path d="M12 21.8 L9.3 17.6 L4.6 15.2 L6.2 11 L3 3 L8.2 7.4 L12 6 L15.8 7.4 L21 3 L17.8 11 L19.4 15.2 L14.7 17.6 Z M8.4 10.6 L10.2 11.6 L9.1 12.7 L7.6 11.9 Z M15.6 10.6 L13.8 11.6 L14.9 12.7 L16.4 11.9 Z M12 16.4 L13.1 18 L12 19.1 L10.9 18 Z"/></svg>
        </div>
        <!-- floating plus -->
        <div style="position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:44px; height:44px; border-radius:50%; background:linear-gradient(145deg,#0A84FF,#0055B8); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 26px rgba(10,132,255,0.5); animation:lbx-float 4s ease-in-out infinite;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FBFAF7" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <div style="position:absolute; inset:-20px; background:radial-gradient(circle, rgba(10,132,255,0.16), transparent 68%); animation:lbx-glow 3.5s ease-in-out infinite; z-index:-1;"></div>
      </div>

      <h2 style="font-family:'Space Grotesk'; font-size:24px; font-weight:600; letter-spacing:-0.01em; color:#F4F3F1; line-height:1.15;">Sua matilha de<br>filmes começa aqui</h2>
      <p style="font-size:14.5px; line-height:1.6; color:#9A99A0; margin-top:14px; max-width:280px;">Adicione filmes que quer assistir e o Loboflix monta o cronograma perfeito para suas noites.</p>

      <button style="margin-top:28px; display:flex; align-items:center; gap:9px; font-family:'Hanken Grotesk'; font-size:16px; font-weight:600; color:#08080B; background:#0A84FF; border:none; padding:15px 26px; border-radius:14px; cursor:pointer; box-shadow:0 10px 30px rgba(10,132,255,0.4);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#08080B" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Adicionar primeiro filme</button>

      <div style="display:flex; align-items:center; gap:8px; margin-top:20px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7A7A82" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
        <span style="font-size:13.5px; color:#9A99A0;">ou <span style="color:#0A84FF; font-weight:600;">buscar um título</span></span>
      </div>
    </div>

    <!-- TAB BAR -->
    <div style="position:absolute; left:14px; right:14px; bottom:16px; background:rgba(19,19,23,0.72); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:26px; padding:14px 10px 12px; display:flex; justify-content:space-around; box-shadow:0 12px 40px rgba(0,0,0,0.5);">
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#7A7A82" stroke-width="1.6"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg><span style="font-size:10px; color:#7A7A82;">Início</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#7A7A82" stroke-width="1.6"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg><span style="font-size:10px; color:#7A7A82;">Agenda</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="#0A84FF"><rect x="4" y="4" width="6" height="16" rx="1"/><rect x="14" y="4" width="6" height="16" rx="1"/></svg><span style="font-size:10px; font-weight:600; color:#0A84FF;">Biblioteca</span></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#7A7A82" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span style="font-size:10px; color:#7A7A82;">Perfil</span></div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:924}}"></script>
</body>
</html>

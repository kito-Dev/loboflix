<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08080B; font-family: 'Hanken Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
  .lbx-scroll::-webkit-scrollbar { display: none; }
  .lbx-scroll { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</helmet>
<div style="min-height:100vh; background:radial-gradient(circle at 50% 0%, #16161f, #08080B 70%); display:flex; align-items:center; justify-content:center; padding:40px 20px;">

  <!-- PHONE -->
  <div style="width:390px; height:844px; background:#0B0B0E; border-radius:52px; border:1px solid #22222B; box-shadow:0 40px 120px rgba(0,0,0,0.7), inset 0 0 0 6px #000; position:relative; overflow:hidden;">

    <!-- fixed header -->
    <div style="position:absolute; top:0; left:0; right:0; z-index:5; background:linear-gradient(to bottom,#0B0B0E 88%,transparent); padding-bottom:14px;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:16px 26px 10px; color:#F4F3F1;">
        <span style="font-family:'Hanken Grotesk'; font-size:15px; font-weight:700; letter-spacing:0.02em;">21:04</span>
        <div style="display:flex; gap:7px; align-items:center;">
          <svg width="17" height="12" viewBox="0 0 17 12" fill="#F4F3F1"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.4"/></svg>
          <svg width="17" height="12" viewBox="0 0 24 18" fill="none" stroke="#F4F3F1" stroke-width="2"><path d="M2 6.5C7 2 17 2 22 6.5M5.5 10C9 7 15 7 18.5 10M9 13.5c1.8-1.5 4.2-1.5 6 0"/></svg>
          <div style="width:24px; height:12px; border:1.5px solid #F4F3F1; border-radius:3px; padding:1.5px; display:flex;"><div style="flex:1; background:#F4F3F1; border-radius:1px;"></div></div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:14px; padding:4px 20px 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F4F3F1" stroke-width="1.7"><path d="M15 6l-6 6 6 6"/></svg>
        <h1 style="font-family:'Space Grotesk'; font-size:22px; font-weight:600; letter-spacing:-0.01em; color:#F4F3F1;">Histórico</h1>
      </div>
    </div>

    <div class="lbx-scroll" style="position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; padding-top:112px;">

      <!-- summary strip -->
      <div style="padding:8px 24px 0;">
        <div style="display:flex; gap:10px;">
          <div style="flex:1; background:linear-gradient(135deg,rgba(10,132,255,0.14),rgba(10,132,255,0.03)); border:1px solid rgba(10,132,255,0.22); border-radius:16px; padding:16px 0; text-align:center;">
            <div style="font-family:'Space Grotesk'; font-size:24px; font-weight:600; color:#F4F3F1;">142</div>
            <div style="font-size:11px; color:#9A99A0; margin-top:2px;">Assistidos</div>
          </div>
          <div style="flex:1; background:#131317; border:1px solid #1C1C22; border-radius:16px; padding:16px 0; text-align:center;">
            <div style="font-family:'Space Grotesk'; font-size:24px; font-weight:600; color:#F4F3F1;">318<span style="font-size:14px; color:#9A99A0;">h</span></div>
            <div style="font-size:11px; color:#9A99A0; margin-top:2px;">No total</div>
          </div>
          <div style="flex:1; background:#131317; border:1px solid #1C1C22; border-radius:16px; padding:16px 0; text-align:center;">
            <div style="display:flex; align-items:center; justify-content:center; gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#E9A23B"><path d="M12 3l2.5 6 6.5.5-5 4.2 1.6 6.3L12 16.8 6.4 20l1.6-6.3-5-4.2 6.5-.5z"/></svg><span style="font-family:'Space Grotesk'; font-size:24px; font-weight:600; color:#F4F3F1;">7.9</span></div>
            <div style="font-size:11px; color:#9A99A0; margin-top:2px;">Nota média</div>
          </div>
        </div>
      </div>

      <!-- grouped history -->
      <div style="padding:8px 24px 40px;">
        <sc-for list="{{ groups }}" as="grp" hint-placeholder-count="2">
          <div style="margin-top:26px;">
            <div style="font-family:'JetBrains Mono'; font-size:11px; letter-spacing:0.12em; color:#7A7A82; margin-bottom:14px;">{{ grp.label }}</div>
            <div style="display:flex; flex-direction:column; gap:12px;">
              <sc-for list="{{ grp.items }}" as="m" hint-placeholder-count="3">
                <div style="display:flex; gap:14px; align-items:center;">
                  <div style="width:52px; height:78px; border-radius:9px; background:{{ m.grad }}; border:1px solid rgba(255,255,255,0.07); flex-shrink:0; position:relative; overflow:hidden;">
                    <div style="position:absolute; inset:0; background:repeating-linear-gradient(120deg,rgba(255,255,255,0.03) 0 8px,transparent 8px 18px);"></div>
                  </div>
                  <div style="flex:1; min-width:0; border-bottom:1px solid #1C1C22; padding-bottom:12px; display:flex; align-items:center; gap:12px;">
                    <div style="flex:1; min-width:0;">
                      <div style="font-family:'Hanken Grotesk'; font-size:15.5px; font-weight:600; color:#F4F3F1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ m.title }}</div>
                      <div style="font-size:12px; color:#7A7A82; margin-top:3px;">{{ m.date }} · {{ m.runtime }}</div>
                      <div style="margin-top:8px;">{{ m.stars }}</div>
                    </div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3A3A45" stroke-width="1.6" style="flex-shrink:0;"><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
                  </div>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:924}}">
class Component extends DCLogic {
  stars(n) {
    const arr = [];
    for (let i = 1; i <= 5; i++) {
      arr.push(React.createElement('svg', { key:i, width:13, height:13, viewBox:'0 0 24 24',
        fill: i <= n ? '#0A84FF' : 'none', stroke: i <= n ? '#0A84FF' : '#3A3A45', strokeWidth:1.5, style:{ marginRight:3 } },
        React.createElement('path', { d:'M12 3l2.5 6 6.5.5-5 4.2 1.6 6.3L12 16.8 6.4 20l1.6-6.3-5-4.2 6.5-.5z' })));
    }
    return React.createElement('div', { style:{ display:'flex' } }, arr);
  }
  renderVals() {
    const mk = (title, date, runtime, rating, grad) => ({ title, date, runtime, grad, stars: this.stars(rating) });
    const groups = [
      { label:'ESTA SEMANA', items:[
        mk('Dune','ontem','2h 35m',5,'linear-gradient(160deg,#c69a5b,#5a3d1e)'),
        mk('Her','seg, 1 jul','2h 06m',4,'linear-gradient(160deg,#5e3540,#1e1015)'),
        mk('Whiplash','dom, 30 jun','1h 47m',5,'linear-gradient(160deg,#5c4420,#1c1409)'),
      ]},
      { label:'JUNHO 2026', items:[
        mk('Drive','28 jun','1h 40m',4,'linear-gradient(160deg,#2d3a52,#0e131c)'),
        mk('Prisoners','24 jun','2h 33m',4,'linear-gradient(160deg,#2b3330,#101312)'),
        mk('Sicario','19 jun','2h 01m',3,'linear-gradient(160deg,#4a3a2e,#181310)'),
        mk('Interstellar','12 jun','2h 49m',5,'linear-gradient(160deg,#243447,#0c1118)'),
      ]},
    ];
    return { groups };
  }
}
</script>
</body>
</html>
